<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finance Expense Entry</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="environment-label">staging</p>
        <h1>Finance expense entry</h1>
      </header>

      <form id="expense-form" class="entry-form" autocomplete="off" novalidate>
        <section class="panel" aria-labelledby="runtime-heading">
          <h2 id="runtime-heading">Runtime config</h2>

          <div class="field-stack">
            <label for="function-endpoint">Function endpoint</label>
            <input
              id="function-endpoint"
              name="function-endpoint"
              type="url"
              inputmode="url"
              autocomplete="off"
              spellcheck="false"
              placeholder="https://.../functions/v1/log-finance-activity"
              required
            >
          </div>

          <div class="field-stack">
            <label for="access-value">Session access value</label>
            <input
              id="access-value"
              name="access-value"
              type="password"
              autocomplete="off"
              spellcheck="false"
              placeholder="Bearer token"
              required
            >
          </div>

          <div class="field-stack">
            <label for="account-id">Staging account ref</label>
            <input
              id="account-id"
              name="account-id"
              type="text"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              placeholder="Account UUID"
              required
            >
          </div>

          <div class="field-stack">
            <label for="category-id">Staging expense category ref</label>
            <input
              id="category-id"
              name="category-id"
              type="text"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              placeholder="Expense category UUID"
              required
            >
          </div>
        </section>

        <section class="panel" aria-labelledby="expense-heading">
          <h2 id="expense-heading">Expense</h2>

          <div class="date-row">
            <span>Activity date</span>
            <output id="activity-date" aria-live="polite"></output>
          </div>

          <div class="field-stack">
            <label for="amount">Amount</label>
            <input
              id="amount"
              name="amount"
              type="number"
              inputmode="decimal"
              min="0.01"
              step="0.01"
              placeholder="0"
              required
            >
          </div>

          <div class="field-stack">
            <label for="description">Description</label>
            <textarea
              id="description"
              name="description"
              rows="3"
              maxlength="240"
              placeholder="Expense note"
              required
            ></textarea>
          </div>

          <button id="submit-button" type="submit">Log expense</button>
        </section>
      </form>

      <section
        id="status-panel"
        class="status-panel"
        role="status"
        aria-live="polite"
        hidden
      ></section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
